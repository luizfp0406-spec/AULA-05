<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Summer beast Festival - Contato</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="menu">
    <div class="container nav">
      <h1 class="logo"><i class="fa-solid fa-laptop-code"></i> Summer beast Festival</h1>
      <nav>
        <ul class="menu-lista">
          <li><a href="index.html">Home</a></li>
          <li><a href="pagina2.html">Programação</a></li>
          <li><a href="pagina3.html">Galeria</a></li>
          <li><a href="contato.html">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container secao">
    <h2><i class="fa-solid fa-envelope"></i> Entre em contato</h2>

    <form class="formulario">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Digite seu email">

      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone">

      <label for="assunto">Assunto</label>
      <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto">

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>

      <!-- CSS Inline -->
      <button type="submit" style="background-color: #2563eb; color: white;">Enviar</button>
    </form>
  </main>

  <footer id="rodape">
    <p><i class="fa-solid fa-location-dot"></i> Vitória - ES</p>
    <p><i class="fa-solid fa-envelope"></i> contato@ Festival beast luiz.com</p>
    <p>&copy; 2026 - Summer beast Festival </p>
  </footer>

</body>
</html>
